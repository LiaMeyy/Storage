<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <style>
        .product-number {
            background-color: #633a4c;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 12px;
        }
    </style>
    <header>
        <div class="container text-center">
            <h1 class="fw-bold m-0">Storage</h1>
            <p class="opacity-75 mb-0">Gestión Profesional de productos</p>
        </div>
    </header>
    <!-- contenedor padre -->
    <div class="container my-4">

        <!-- contenedor con los botones -->
        <div class="row mb-4 align-items-center">
            <div class="col-md-6 text-center text-md-start">
                <button class="btn btn-primary btn-lg shadow-sm px-4" data-bs-toggle="modal"
                    data-bs-target="#modalProducto" onclick="limpiarFormulario()">
                    Nuevo Producto
                </button>
            </div>
            <div class="col-md-6 mt-3 mt-md-0">
                <div class="d-flex justify-content-center justify-content-md-end flex-wrap gap-2">
                    <button class="btn btn-outline-primary btn-sm" onclick="filtrar('todos')">TODOS</button>
                    <button class="btn btn-success btn-sm" onclick="filtrar('Activo')">ACTIVOS</button>
                    <button class="btn btn-danger btn-sm" onclick="filtrar('No Stock')">NO STOCK</button>
                    <button class="btn btn-secondary btn-sm" onclick="filtrar('Descontinuado')">DESCONTINUADO</button>
                </div>
            </div>
        </div>
        
        <!-- Contenedor de Alertas -->
        <div id="alerta2" class="shadow-sm"></div>
        <div id="product-container" class="row g-4 m-4"></div>

    <!-- MODALES -->

    <!-- Modal Producto -->
    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formProduct">
                        <input type="hidden" id="indiceEditar">
                        <div id="alerta" class="mb-3"></div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Nombre Producto</label>
                                <input type="text" class="form-control" id="producto" placeholder="Pastas">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Precio</label>
                                <input type="text" class="form-control" id="precio" placeholder="5000">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Cantidad</label>
                                <input type="number" class="form-control" id="cantidad" placeholder="Por unidad">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Descripcion del producto</label>
                                <textarea class="form-control" id="descripcion" rows="2"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Estado</label>
                                <select class="form-select" id="estado">
                                    <option>Activo</option>
                                    <option>No Stock</option>
                                    <option>Descontinuado</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-success px-4" onclick="guardarproducto()">Guardar Registro</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalConfirmarEliminar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-4">
                    <div class="text-danger mb-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor"
                            class="bi bi-trash3-fill" viewBox="0 0 16 16">
                            <path
                                d="M11 1.5v1h3.5a.5.5 0 0 1 0 1h-.538l-.853 10.66A2 2 0 0 1 11.115 16h-6.23a2 2 0 0 1-1.994-1.84L2.038 3.5H1.5a.5.5 0 0 1 0-1H5v-1A1.5 1.5 0 0 1 6.5 0h3A1.5 1.5 0 0 1 11 1.5m-5 0v1h4v-1a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5M4.5 5.029l.5 8.5a.5.5 0 1 0 .998-.06l-.5-8.5a.5.5 0 1 0-.998.06m6.53-.528a.5.5 0 0 0-.528.47l-.5 8.5a.5.5 0 0 0 .998.058l.5-8.5a.5.5 0 0 0-.47-.528M8 4.5a.5.5 0 0 0-.5.5v8.5a.5.5 0 0 0 1 0V5a.5.5 0 0 0-.5-.5" />
                        </svg>
                    </div>
                    <h6 class="fw-bold">¿Eliminar esta cita?</h6>
                    <div class="d-flex gap-2 mt-3">
                        <button class="btn btn-light btn-sm w-100" data-bs-dismiss="modal">No</button>
                        <button class="btn btn-danger btn-sm w-100" id="btnConfirmarBorrar">Sí, borrar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>

        // VARIABLES GLOBALES
        let storage = JSON.parse(localStorage.getItem('tienda_storage')) || [];
        let indiceBorrar = null;

        // ESCUCHAR DOCUMENTO
        document.addEventListener('DOMContentLoaded', () => {
            mostrarProductos(storage);
        });

        // GUARDAR EN STORAGE
        function guardarEnStorage() {
            localStorage.setItem('tienda_storage', JSON.stringify(storage));
        }

        // MOSTRAR MENSAJE
        function mostrarAlerta(mensaje, tipo = "warning") {
            const alerta = document.getElementById('alerta');
            alerta.innerHTML = `
        <div class="alert alert-${tipo} alert-dismissible fade show border-0 shadow-sm">
          ${mensaje}
          <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>`;
            setTimeout(() => { alerta.innerHTML = ''; }, 4000);
        }
        function mostrarAlerta2(mensaje, tipo = "warning") {
            const alerta2 = document.getElementById("alerta2");
            alerta2.innerHTML = `
        <div class="alert alert-${tipo} alert-dismissible fade show border-0 shadow-sm">
          ${mensaje}
          <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>`;
            setTimeout(() => { alerta.innerHTML = ''; }, 4000);
        }


        // GUARDAR CITA
        function guardarproducto() {
            const campos = ['producto', 'precio', 'descripcion', 'cantidad', 'estado'];
            const valores = {};
            for (let campo of campos) {
                valores[campo] = document.getElementById(campo).value.trim();
                if (!valores[campo]) {
                    return mostrarAlerta(`el campo ${campo} es obligatorio`, "danger");
                }
            }

            if (valores.estado === 'No Stock' && valores.cantidad !== '0') {
                return mostrarAlerta("Si pone el estado No Stock, la cantidad debe ser 0", "danger");
            }

            const indice = document.getElementById("indiceEditar").value;

            if (indice === '') storage.push(valores);
            else storage[indice] = valores;
            guardarEnStorage();
            mostrarProductos(storage);
            bootstrap.Modal.getInstance(document.getElementById('modalProducto')).hide();
            return mostrarAlerta2("Registro Guardado", "success");
        }

        // MOSTRAR PRODUCTOS

        function mostrarProductos(storage) {
            const contenedor = document.getElementById("product-container");
            contenedor.innerHTML = storage.length === 0 ? `<p class="text-center text-muted">No hay citas registradas</p>` : '';

            storage.forEach((p, i) => {
                const badgeColor = p.estado === 'Activo' ? 'bg-success' : (p.estado === 'NoStock' ? 'bg-danger' : 'bg-secondary');
                const numId = (i + 1).toString().padStart(2, '0');
                if (p.estado == 'Descontinuado') {
                    contenedor.innerHTML += `
                <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm h-100">
              <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3">
                <div class="d-flex align-items-center">
                   <div class="product-number">${numId}</div>
                   </div>
                <span class="badge rounded-pill ${badgeColor}">${p.estado}</span>
              </div>
              <div class="card-body">
                <p class="mb-1 small"><strong>Nombre:</strong> ${p.producto}</p>
                <p class="mb-1 small"><strong>Precio:</strong> ${p.precio}</p>
                <p class="mb-1 small"><strong>Cantidad:</strong> ${p.cantidad}</p>
                <p class="mb-1 small"><strong>Descripcion:</strong></p>
                <div class="bg-light p-2 rounded mt-2 small"><em>${p.descripcion}</em></div>
              </div>
                <div class="card-footer bg-white border-0 d-flex gap-2 pb-3">
                <button class="btn btn-outline-warning btn-sm w-100" onclick="editarProducto(${i})">Editar</button>
                <button class="btn btn-outline-danger btn-sm w-100" onclick="confirmarEliminacion(${i})">Eliminar</button>
              </div>
            </div>
          </div>`;
                } else {
                    contenedor.innerHTML += `
                <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm h-100">
              <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3">
                <div class="d-flex align-items-center">
                   <div class="product-number">${numId}</div>
                   </div>
                <span class="badge rounded-pill ${badgeColor}">${p.estado}</span>
              </div>
              <div class="card-body">
                <p class="mb-1 small"><strong>Nombre:</strong> ${p.producto}</p>
                <p class="mb-1 small"><strong>Precio:</strong> ${p.precio}</p>
                <p class="mb-1 small"><strong>Cantidad:</strong> ${p.cantidad}</p>
                <p class="mb-1 small"><strong>Descripcion:</strong></p>
                <div class="bg-light p-2 rounded mt-2 small"><em>${p.descripcion}</em></div>
              </div>
                <div class="card-footer bg-white border-0 d-flex gap-2 pb-3">
                <button class="btn btn-outline-warning btn-sm w-100" onclick="editarProducto(${i})">Editar</button>
              </div>
            </div>
          </div>`;
                }

            })
        }

        // EDITAR PRODUCTO
        function editarProducto(i) {
            const p = storage[i];
            Object.keys(p).forEach(key => document.getElementById(key).value = p[key]);
            document.getElementById("indiceEditar").value = i;
            document.getElementById("modalTitulo").textContent = 'Edicion del Producto';
            new bootstrap.Modal(document.getElementById('modalProducto')).show();
        }

        // ELIMINAR PRODUCTO
        function confirmarEliminacion(i) {
            indiceBorrar = i;
            const modal = new bootstrap.Modal(document.getElementById('modalConfirmarEliminar'));
            modal.show()

            document.getElementById('btnConfirmarBorrar').onclick = function () {
                if (indiceBorrar !== null) {
                    storage.splice(indiceBorrar, 1);
                    guardarEnStorage();
                    mostrarProductos(storage);
                    bootstrap.Modal.getInstance(document.getElementById('modalConfirmarEliminar')).hide();
                    indiceBorrar = null;
                    return mostrarAlerta2("Producto Eliminado", "success");
                }
            }
        }

        // FILTRAR
        function filtrar(estado) {
            if (estado === "todos") return mostrarProductos(storage);
            mostrarProductos(storage.filter(p => p.estado === estado));
        }

        // LIMPIAR DOCUMENTO PARA NUEVO REGISTRO
        function limpiarFormulario() {
            document.getElementById('formProduct').reset();
            document.getElementById('indiceEditar').value = '';
        }

    </script>
</body>

</html>
